name: CI

# Runs the quality gate on every illustrative demo module in this repo. Each
# module carries its own go.mod and Makefile; the gate is the same `make check`
# developers run locally — format, vet, lint, staticcheck, cognitive
# complexity, vulnerability scan, build, and (where present) example tests.
# These are documentation/demos, so there is no coverage or release stage.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Quality gate
        run: make check
